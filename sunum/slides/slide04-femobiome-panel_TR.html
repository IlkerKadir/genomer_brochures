<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 720pt;
    height: 405pt;
    display: flex;
    flex-direction: column;
    font-family: Arial, Helvetica, sans-serif;

    overflow: hidden;
  }

    height: 48pt;

  }
  .content > p {
    font-size: 8pt;
    color: #4A4A5A;
    margin-bottom: 10pt;
    align-self: flex-start;
  }
  .placeholder {
    width: 640pt;
    height: 290pt;
    background: #f5f5f5;
    border-radius: 4pt;
    border: 1pt dashed #D1D5DB;
  }
  .footer {
    width: 100%;
    padding: 8pt 28pt;
    flex-shrink: 0;
  }
  .footer p {
    font-size: 7pt;
    color: #7B4B94;
    font-weight: bold;
  }
</style>
</head>
<body>
  <div class="header">

  <div class="content">

    <div id="panel-table" class="placeholder"></div>
  </div>
  <div class="footer">

  </div>
</body>
</html>
