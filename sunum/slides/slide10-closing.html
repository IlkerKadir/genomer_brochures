<!DOCTYPE html>
<html>
<head>
<style>
html { background: #1B262C; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  font-family: Arial, sans-serif;
  display: flex;
  background: #1B262C;
}
.container { width: 100%; height: 100%; position: relative; }
.center { position: absolute; top: 60pt; left: 0; right: 0; text-align: center; }
.center img { height: 40pt; margin-bottom: 16pt; }
.cards-row { position: absolute; top: 175pt; left: 60pt; right: 60pt; display: flex; gap: 16pt; }
.mini-card { flex: 1; background: rgba(255,255,255,0.08); border-radius: 6pt; padding: 12pt; text-align: center; border: 1pt solid rgba(255,255,255,0.15); }
.contact-info { position: absolute; bottom: 35pt; left: 0; right: 0; text-align: center; }
</style>
</head>
<body>
<div class="container">
  <div class="center">
    <img src="genomerlogo.png">
    <h1 style="color: #FFFFFF; font-size: 22pt; margin-bottom: 8pt;">Microbiome Testing Solutions</h1>
    <p style="color: #38BDF8; font-size: 11pt;">Comprehensive molecular diagnostics for clinical microbiota assessment</p>
  </div>
  <div class="cards-row">
    <div class="mini-card">
      <h4 style="color: #C084FC; font-size: 10pt; margin-bottom: 4pt;">FEMOBIOME II</h4>
      <p style="color: #94A3B8; font-size: 8pt;">Women's urogenital microbiota</p>
    </div>
    <div class="mini-card">
      <h4 style="color: #2DD4BF; font-size: 10pt; margin-bottom: 4pt;">ENTEROBIOME KIDS</h4>
      <p style="color: #94A3B8; font-size: 8pt;">Children's gut microbiota</p>
    </div>
    <div class="mini-card">
      <h4 style="color: #38BDF8; font-size: 10pt; margin-bottom: 4pt;">ANDROBIOME</h4>
      <p style="color: #94A3B8; font-size: 8pt;">Male urogenital microbiota</p>
    </div>
  </div>
  <div class="contact-info">
    <p style="color: #94A3B8; font-size: 9pt; margin-bottom: 4pt;">www.genomer.com.tr</p>
    <p style="color: #64748B; font-size: 8pt;">info@genomer.com.tr</p>
  </div>
</div>
</body>
</html>
